; PlatformIO Project Configuration File
;
; Two build variants share a common base:
;   - s3_full : LILYGO T-SIM7080G-S3 (ESP32-S3-N16R8, modem + GPS + PMU + battery)
;               This is the production board described in the README.
;   - s3_lite : Plain ESP32-S3 with 16 MB flash, USB-powered, no modem/PMU/battery.
;               Reduced feature set: BLE ELM327 + CAN bus + telemetry buffer +
;               WiFi-only upload (no LTE). Still in preparation, not production-ready.
;
; Build:
;   pio run -e s3_full        # default — current LILYGO build
;   pio run -e s3_lite        # preparation env — see FEATURE_* flags below

[platformio]
default_envs = s3_full

[env]
platform = espressif32@~6.12.0
framework = arduino
monitor_speed = 115200
board = esp32-s3-devkitc-1
board_build.filesystem = spiffs
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
; Embed static web assets into the app binary so SPIFFS corruption
; can't take down the UI.
board_build.embed_txtfiles =
    data/debug.html
    data/config.html
    data/daten.html
    data/common.js
    data/i18n.js
    data/style.css
    data/lang/de.json
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    mathieucarbou/AsyncTCP@^3.3.2
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    bblanchon/ArduinoJson@^7.3.1
    h2zero/NimBLE-Arduino@1.4.1

; ===========================================================================
;  Full variant — LILYGO T-SIM7080G-S3
; ===========================================================================
[env:s3_full]
board_build.partitions = partitions.csv
build_flags =
    ${env.build_flags}
    -DTINY_GSM_MODEM_SIM7080
    -DFEATURE_MODEM=1
    -DFEATURE_GPS_EXT=1
    -DFEATURE_PMU=1
    -DFEATURE_BLE=1
    -DFEATURE_CAN=1
    -DFEATURE_WIFI_UPLOAD=1
lib_deps =
    ${env.lib_deps}
    vshymanskyy/TinyGSM@^0.11.7
    lewisxhe/XPowersLib@^0.3.3

; ===========================================================================
;  Lite variant — plain ESP32-S3 with 16 MB flash
;  Status: PREPARATION ONLY — does not yet compile cleanly. The intent is
;  to scaffold the feature flags and partition layout so the implementation
;  can land in a follow-up commit. See README §Lite variant for hardware
;  notes and power-supply caveats.
; ===========================================================================
[env:s3_lite]
board_build.partitions = partitions_lite.csv
build_flags =
    ${env.build_flags}
    -DFEATURE_MODEM=0
    -DFEATURE_GPS_EXT=0
    -DFEATURE_PMU=0
    -DFEATURE_BLE=1
    -DFEATURE_CAN=1
    -DFEATURE_WIFI_UPLOAD=1
; Exclude the .cpp files that depend on the LILYGO hardware (modem UART,
; MQTT-over-modem, AXP2101). Their headers provide inline no-op stubs so
; callers compile unchanged.
build_src_filter = +<*> -<mod_modem.cpp> -<mod_mqtt.cpp> -<mod_pmu.cpp>
; No TinyGSM / XPowersLib — lite variant has no modem or PMU.
