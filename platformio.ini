; Telemetry Stick - PlatformIO Config
; Hardware: LILYGO T-SIM7080G-S3 (ESP32-S3-WROOM-1-N16R8) + SN65HVD230
; URL:      http://192.168.4.1
;
; WICHTIG - Upload-Schritte:
;   1. "Upload"                  -> flasht den Programmcode
;   2. "Upload Filesystem Image" -> laedt HTML nach /www (2MB)
;      (nur noetig wenn HTML Dateien geaendert wurden)
;      Loescht NICHT die Daten-Partition /nvdata
;
; Partitionen:
;   www    (2MB) - HTML/JS Dateien, wird bei Filesystem-Upload ueberschrieben
;   nvdata (2MB) - Persistente Daten (Logs, Config, Laufzeit), bleibt erhalten
;
; Module:
;   src/config.h       - Alle Defines
;   src/shared.h       - Gemeinsame Typen
;   src/mod_can.h/cpp  - CAN Bus, UDS, Scanner
;   src/mod_log.h/cpp  - Log Ring-Buffer
;   src/mod_web.h/cpp  - WebServer (HTML aus SPIFFS)
;   src/mod_ble_scan   - BLE ELM327 Basis
;   src/mod_elm327     - BLE ELM327 fuer ABRP
;   src/mod_wifi_guard - WiFi SSID Waechter
;   data/index.html    - Hauptseite
;   data/config.html   - Config / WiFi Guard Seite

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ESP32-S3 N16R8: 16MB Flash, 8MB PSRAM (OPI)
board_build.partitions = partitions.csv
board_build.filesystem = spiffs
board_upload.flash_size = 16MB

board_build.arduino.memory_type = qio_opi

lib_deps =
    https://github.com/mathieucarbou/AsyncTCP
    https://github.com/mathieucarbou/ESPAsyncWebServer
    bblanchon/ArduinoJson@^7.3.1
    h2zero/NimBLE-Arduino@1.4.1
    vshymanskyy/TinyGSM@^0.11.7
    arduino-libraries/ArduinoHttpClient@^0.5.0
    lewisxhe/XPowersLib@^0.3.3

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DTINY_GSM_MODEM_SIM7080
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1