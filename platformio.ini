; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = s3_full

[env]
platform = espressif32@~6.12.0
framework = arduino
monitor_speed = 115200
board = esp32-s3-devkitc-1
board_build.filesystem = spiffs
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.embed_txtfiles = 
	data/debug.html
	data/config.html
	data/daten.html
	data/common.js
	data/i18n.js
	data/style.css
	data/lang/de.json
	data/lang/en.json
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
lib_deps = 
	mathieucarbou/AsyncTCP@^3.3.2
	mathieucarbou/ESPAsyncWebServer@^3.6.0
	bblanchon/ArduinoJson@^7.3.1
	h2zero/NimBLE-Arduino@1.4.1
	bertmelis/espMqttClient@^1.4.4
; espMqttClient deklariert ESPAsyncTCP (nur für die ungenutzte Async-Variante);
; die Lib bricht auf dem aktuellen ESP32-Core. Wir nutzen nur den synchronen
; espMqttClient (ClientSync) → ESPAsyncTCP ignorieren (FIXES B.4).
lib_ignore =
	ESPAsyncTCP

[env:s3_full]
board_build.partitions = partitions.csv
build_flags = 
	${env.build_flags}
	-DTINY_GSM_MODEM_SIM7080
	-DFEATURE_MODEM=1
	-DFEATURE_GPS_EXT=1
	-DFEATURE_PMU=1
	-DFEATURE_BLE=1
	-DFEATURE_CAN=1
	-DFEATURE_WIFI_UPLOAD=1
lib_deps = 
	${env.lib_deps}
	vshymanskyy/TinyGSM@^0.11.7
	lewisxhe/XPowersLib@^0.3.3

[env:s3_lite]
board_build.partitions = partitions_lite.csv
build_flags = 
	${env.build_flags}
	-DFEATURE_MODEM=0
	-DFEATURE_GPS_EXT=0
	-DFEATURE_PMU=0
	-DFEATURE_BLE=1
	-DFEATURE_CAN=1
	-DFEATURE_WIFI_UPLOAD=1
build_src_filter = +<*> -<mod_modem.cpp> -<mod_mqtt.cpp> -<mod_pmu.cpp>
